name: build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0 or v1.0.0-beta)'
        required: true
        type: string
      is_beta:
        description: 'Is this a beta/pre-release?'
        required: true
        type: boolean
        default: true
      skip_release:
        description: 'Skip creating GitHub release (build only)'
        required: false
        type: boolean
        default: false

env:
  IS_STABLE: ${{ github.event_name == 'push' && !contains(github.ref, '-') || github.event_name == 'workflow_dispatch' && inputs.is_beta == false }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
          - platform: windows
            os: Windows-2022
            arch: amd64
          - platform: linux
            os: ubuntu-22.04
            arch: amd64
          - platform: macos
            os: macos-15-intel
            arch: amd64
          - platform: macos
            os: macos-latest
            arch: arm64
          #          - platform: windows
          #            os: windows-11-arm
          #            arch: arm64
          - platform: linux
            os: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Setup rust
        if: startsWith(matrix.os, 'windows-11-arm')
        run: |
          Invoke-WebRequest -Uri "https://win.rustup.rs/aarch64" -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable
          $cargoPath = "$env:USERPROFILE\.cargo\bin"
          Add-Content $env:GITHUB_PATH $cargoPath

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.sha }}

      # Android signing disabled for test builds
      # - name: Setup Android Signing
      #   if: startsWith(matrix.platform,'android') && env.IS_STABLE == 'true'
      #   run: |
      #     echo "${{ secrets.KEYSTORE }}" | base64 --decode > android/app/keystore.jks
      #     echo "${{ secrets.SERVICE_JSON }}" | base64 --decode > android/app/google-services.json
      #     echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/local.properties
      #     echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> android/local.properties
      #     echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/local.properties

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.0'
          cache-dependency-path: |
            core/go.sum

      - name: Setup Flutter
        if: ${{ !(startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')) }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.7
          cache: true
      - name: Setup Flutter With Other
        if: startsWith(matrix.os, 'windows-11-arm') || startsWith(matrix.os, 'ubuntu-24.04-arm')
        uses: subosito/flutter-action@v2
        with:
          channel: master
          flutter-version: 3.35.7
          cache: true

      - name: Get Flutter Dependency
        run: |
          flutter --version
          flutter pub get

      - name: Setup
        run: dart setup.dart ${{ matrix.platform }} ${{ matrix.arch && format('--arch {0}', matrix.arch) }} ${{ env.IS_STABLE == 'true' && '--env stable' || '--env beta' }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}${{ matrix.arch && format('-{0}', matrix.arch) }}
          path: ./dist
          overwrite: true

  upload:
    permissions: write-all
    needs: [ build ]
    runs-on: ubuntu-latest
    services:
      telegram-bot-api:
        image: aiogram/telegram-bot-api:latest
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        ports:
          - 8081:8081
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.sha }}

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist/
          pattern: artifact-*
          merge-multiple: true

      - name: Generate release.md
        run: |
          # Determine version tag
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          
          # Find previous tag for changelog
          if [ "${{ env.IS_STABLE }}" == "true" ]; then
            preTag=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
            sed -nE 's/.*"tag_name": "([^"]+)".*/\1/p')
          else
            # For beta, get latest pre-release or any release
            preTag=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases" | \
            grep -o '"tag_name": "[^"]*' | head -1 | sed 's/"tag_name": "//')
          fi
          
          [ -z "$preTag" ] && preTag=""
          
          out="release.md"
          echo "" > "$out"
          
          # Add beta warning if not stable
          if [ "${{ env.IS_STABLE }}" != "true" ]; then
            echo "⚠️ **This is a BETA/TEST release. Use at your own risk.**" >> "$out"
            echo "" >> "$out"
            echo "**Version:** $TAG" >> "$out"
            echo "" >> "$out"
            echo "**Changes:**" >> "$out"
            echo "" >> "$out"
          fi
          
          # Generate changelog from commits
          if [ -n "$preTag" ]; then
            git log --no-merges --pretty=format:"%B" "$preTag..HEAD" | \
            awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$out"
          else
            git log --no-merges -20 --pretty=format:"%B" | \
            awk '!/Update changelog/ && NF {print "- " $0 "\n"}' >> "$out"
          fi

      - name: Push to Telegram
        if: ${{ inputs.skip_release == false || github.event_name == 'push' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          IS_BETA: ${{ env.IS_STABLE != 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install requests
          python release_telegram.py

      - name: Generate sha256
        run: |
          cd ./dist
          for file in $(find . -type f -not -name "*.sha256"); do
            sha256sum "$file" > "${file}.sha256"
          done  

      - name: Release to GitHub
        if: ${{ (inputs.skip_release == false || github.event_name == 'push') && success() }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: ./dist/*
          body_path: './release.md'
          prerelease: ${{ env.IS_STABLE != 'true' }}
          make_latest: ${{ env.IS_STABLE == 'true' }}
          generate_release_notes: false

      - name: Upload Artifacts Only (No Release)
        if: ${{ inputs.skip_release == true && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: manual-build-${{ inputs.version }}
          path: ./dist/*
          overwrite: true
